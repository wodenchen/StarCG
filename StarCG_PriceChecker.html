<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星詠魔力 - 市場查價器</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #f5f0e8;
            --bg-card: #fffbf5;
            --bg-card-hover: #fff8ec;
            --border: #e0d5c5;
            --text-primary: #4a3f35;
            --text-secondary: #8b7355;
            --accent-gold: #d4a024;
            --accent-blue: #5b8cb8;
            --accent-green: #5a9a5a;
            --accent-red: #c75050;
            --accent-purple: #9068b0;
            --server-1: #d35d5d;
            --server-2: #5a9a5a;
            --server-3: #5b8cb8;
            --shadow: 0 4px 16px rgba(74,63,53,0.12);
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            font-size: 16px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #b8860b, #8b4513);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .badge {
            background: var(--accent-purple);
            color: #fff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        /* Search Panel */
        .search-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
        }

        .search-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-group.grow {
            flex: 1;
            min-width: 200px;
        }

        .exchange-rate-group input {
            width: 100px;
        }

        input[type="text"], input[type="number"], select {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 1.05rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2);
        }

        button {
            background: linear-gradient(135deg, #b48a61, #8b6b4a);
            border: none;
            border-radius: var(--radius);
            padding: 12px 24px;
            color: #fff;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139,107,74,0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        button.secondary {
            background: #fff;
            border: 2px solid #b48a61;
            color: #6b4c2a;
        }

        button.secondary:hover {
            background: #f5e6d3;
            border-color: #8b6b4a;
            box-shadow: none;
        }

        /* Quick Tags */
        .quick-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .quick-tag {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .quick-tag:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        .quick-tag .remove {
            color: var(--accent-red);
            font-weight: bold;
            opacity: 0.6;
        }

        .quick-tag .remove:hover {
            opacity: 1;
        }

        .quick-tag .pin {
            opacity: 0.55;
            font-size: 0.9rem;
        }

        .quick-tag .pin:hover {
            opacity: 1;
        }

        .quick-tag .label {
            flex: 1;
        }

        .quick-tag.pinned {
            background: #fff4dc;
            border-color: var(--accent-gold);
        }

        .quick-tag.pinned .pin {
            opacity: 1;
        }

        .clear-tags {
            background: var(--bg-dark);
            border: 1px dashed var(--accent-red);
            color: var(--accent-red);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .clear-tags:hover {
            background: var(--accent-red);
            color: #fff;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
        }

        .stat-card .label {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .stat-card .value {
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1.4;
        }

        .stat-card .value.gold { color: var(--accent-gold); }
        .stat-card .value.green { color: var(--accent-green); }
        .stat-card .value.blue { color: var(--accent-blue); }
        .stat-card .value.red { color: var(--accent-red); }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            background: var(--bg-card);
            padding: 4px;
            border-radius: var(--radius);
            width: fit-content;
        }

        .tab {
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            background: #b48a61;
            color: #fff;
        }

        /* Tables */
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .table-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th {
            background: var(--bg-dark);
            padding: 14px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }

        th:hover {
            color: var(--accent-blue);
        }

        th .sort-icon {
            margin-left: 4px;
            opacity: 0.5;
        }

        th .sort-icon.active {
            opacity: 1;
            color: var(--accent-gold);
        }

        td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 1rem;
        }

        /* 固定第一欄（物品名稱） */
        th:first-child,
        td:first-child {
            position: sticky;
            left: 0;
            background: var(--bg-card);
            z-index: 2;
            border-right: 2px solid var(--border);
        }

        th:first-child {
            background: var(--bg-dark);
            z-index: 3;
        }

        tr:hover td {
            background: var(--bg-card-hover);
        }

        tr:hover td:first-child {
            background: var(--bg-card-hover);
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* Server Badge */
        .server-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-right: 6px;
        }

        .server-badge.s1 { background: var(--server-1); color: #fff; }
        .server-badge.s2 { background: var(--server-2); color: #fff; }
        .server-badge.s3 { background: var(--server-3); color: #fff; }

        /* 改造圖等級標籤 */
        .grade-normal {
            background: #D2691E;
            color: #fff;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-left: 8px;
            display: inline-block;
            vertical-align: middle;
        }
        .grade-silver {
            background: #808080;
            color: #fff;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-left: 8px;
            display: inline-block;
            vertical-align: middle;
        }
        .grade-gold {
            background: #DAA520;
            color: #fff;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-left: 8px;
            display: inline-block;
            vertical-align: middle;
        }

        /* 重來的種子 BP 標籤 */
        .bp-plus {
            background: #27ae60;
            color: #fff;
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 4px;
        }
        .bp-minus {
            background: #e74c3c;
            color: #fff;
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 4px;
        }

        /* 寵物標籤 */
        .pet-lv {
            background: #3498db;
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 6px;
        }
        
        .pet-trans {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 4px;
        }
        
        .pet-slot {
            background: #27ae60;
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 4px;
        }

        /* Price Display */
        .price {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }

        .price.coin { color: var(--accent-gold); }
        .price.crystal { color: var(--accent-purple); }

        .converted {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-left: 8px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .loading .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Inline Chart Container (在表格行內) */
        .inline-chart-container {
            background: var(--bg-card);
            padding: 16px;
            border-top: 2px solid var(--border);
        }

        .inline-chart-container .chart-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .inline-chart-wrapper {
            position: relative;
            height: 250px;
        }

        .chart-row td {
            padding: 0 !important;
        }

        /* History Summary */
        .history-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .summary-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        .summary-card h3 {
            font-size: 1rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .summary-row:last-child {
            border-bottom: none;
        }

        .summary-row .label {
            color: var(--text-secondary);
        }

        .summary-row .value {
            font-weight: 600;
        }

        /* Responsive - 平板 */
        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }

            .header {
                flex-wrap: wrap;
            }

            .header h1 {
                font-size: 1.25rem;
            }

            .header a {
                font-size: 0.75rem;
                margin-left: 0;
                width: 100%;
                margin-top: 8px;
            }

            .search-row {
                flex-direction: column;
            }

            .form-group {
                width: 100%;
            }

            .form-group.grow {
                width: 100%;
            }

            .search-row button {
                width: 100%;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .tabs {
                width: 100%;
            }

            .tab {
                flex: 1;
                text-align: center;
                padding: 10px 12px;
                font-size: 0.9rem;
            }

            /* 表格水平滾動 */
            .table-container {
                overflow: hidden;
            }

            .table-scroll {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            table {
                min-width: 800px;
            }
        }

        /* Responsive - 手機 */
        @media (max-width: 480px) {
            .container {
                padding: 8px;
            }

            .header h1 {
                font-size: 1.1rem;
            }

            .header .badge {
                font-size: 0.65rem;
                padding: 3px 8px;
            }

            .search-panel {
                padding: 12px;
            }

            .form-group label {
                font-size: 0.85rem;
            }

            input[type="text"], input[type="number"], select {
                padding: 10px 12px;
                font-size: 1rem;
            }

            button {
                padding: 12px 16px;
                font-size: 1rem;
            }

            .quick-tags {
                gap: 6px;
            }

            .quick-tag {
                padding: 6px 12px;
                font-size: 0.9rem;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            .stat-card {
                padding: 12px 8px;
            }

            .stat-card .label {
                font-size: 0.95rem;
                font-weight: 600;
            }

            .stat-card .value {
                font-size: 1.0rem;
                line-height: 1.3;
            }

            .tabs {
                padding: 3px;
            }

            .tab {
                padding: 8px 10px;
                font-size: 0.85rem;
            }

            td, th {
                padding: 10px 8px;
                font-size: 0.9rem;
            }

            .price {
                font-size: 0.9rem;
            }

            .converted {
                display: block;
                margin-left: 0;
                margin-top: 2px;
                font-size: 0.8rem;
            }

            .grade-normal, .grade-silver, .grade-gold {
                font-size: 0.7rem;
                padding: 1px 6px;
                margin-left: 4px;
            }

            .bp-plus, .bp-minus {
                font-size: 0.65rem;
                padding: 1px 4px;
                margin-left: 2px;
            }

            .server-badge {
                font-size: 0.65rem;
                padding: 1px 5px;
            }

            .chart-container {
                padding: 12px;
            }

            .chart-wrapper {
                height: 250px;
            }

            .empty-state {
                padding: 40px 16px;
            }

            .empty-state .icon {
                font-size: 2.5rem;
            }
        }

        /* Tooltip */
        .tooltip {
            position: relative;
        }

        .tooltip::after {
            content: attr(data-tip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-dark);
            border: 1px solid var(--border);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .tooltip:hover::after {
            opacity: 1;
        }

        /* Highlight row */
        .highlight {
            animation: highlight 1.5s ease-out;
        }

        @keyframes highlight {
            0% { background: rgba(180, 138, 97, 0.3); }
            100% { background: transparent; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            50% { transform: scale(1.02); box-shadow: 0 0 15px 5px rgba(231, 76, 60, 0.4); }
        }

        /* 攤位地圖 */
        .location-link {
            cursor: pointer;
            color: var(--accent-blue);
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .location-link:hover {
            color: #3d6f9a;
        }

        .map-modal {
            position: fixed;
            inset: 0;
            background: rgba(74, 63, 53, 0.65);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }
        .map-modal.open { display: flex; }

        .map-dialog {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            max-width: 95vw;
            max-height: 95vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .map-dialog-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-card-hover);
        }
        .map-dialog-header h3 {
            font-size: 1.05rem;
            font-weight: 600;
        }
        .map-dialog-close {
            background: none;
            border: none;
            font-size: 1.25rem;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 4px 8px;
            border-radius: 4px;
        }
        .map-dialog-close:hover {
            background: var(--bg-dark);
            color: var(--text-primary);
        }
        .map-viewer {
            overflow: auto;
            max-height: 80vh;
            display: flex;
            justify-content: center;
            padding: 12px;
        }
        .map-canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid var(--border);
        }

        /* 懸賞清單 */
        .bounty-tabs {
            display: flex;
            gap: 8px;
            padding: 12px 18px 0;
            border-bottom: 1px solid var(--border);
        }
        .bounty-tab {
            padding: 8px 18px;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            font-weight: 500;
            color: var(--text-secondary);
            border: 1px solid transparent;
            border-bottom: none;
        }
        .bounty-tab.active {
            background: var(--bg-card);
            color: var(--accent-gold);
            border-color: var(--border);
        }
        .bounty-body {
            overflow-y: auto;
            max-height: 70vh;
            padding: 16px 18px;
        }
        .bounty-cat {
            margin-bottom: 16px;
        }
        .bounty-cat-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px dashed var(--border);
        }
        .bounty-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .bounty-item {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .bounty-item:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            background: #fff4dc;
        }
        .bounty-item .lv {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-right: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <h1>⭐ 星詠魔力 市場查價器</h1>
        <span class="badge">v2.0</span>
        <a href="https://member.starcg.net/market.php" target="_blank" 
           style="margin-left:auto; color:var(--text-secondary); font-size:0.9rem; text-decoration:none;">
            📋 官方市場
        </a>
    </div>

    <!-- Search Panel -->
    <div class="search-panel">
        <div class="search-row">
            <div class="form-group grow">
                <label>🔍 搜尋物品/寵物名稱</label>
                <input type="text" id="searchInput" placeholder="輸入名稱關鍵字...">
            </div>
            <div class="form-group">
                <label>💰 幣種</label>
                <select id="currencyFilter">

<script>
/* ========================================
   全域變數
======================================== */
// ★★★ 部署後把這行換成你自己的 Cloudflare Worker 網址（結尾保留 /?u=） ★★★
const WORKER_URL = 'https://starcg-proxy.raywode13.workers.dev/?u=';

// CORS 代理（主要用自己的 Worker，公共代理僅作備援）
const CORS_PROXIES = [
    { prefix: WORKER_URL, encode: true },
    { prefix: 'https://api.codetabs.com/v1/proxy/?quest=', encode: true },
    { prefix: 'https://corsproxy.io/?url=', encode: true },
    { prefix: 'https://api.allorigins.win/raw?url=', encode: true }
];

// 本機用 proxy.py 測試時，自動優先走本機代理
if (['localhost', '127.0.0.1'].includes(location.hostname)) {
    CORS_PROXIES.unshift({ prefix: '/proxy?u=', encode: true });
}
let currentProxyIndex = 0;

const API_MARKET_BASE = 'https://member.starcg.net/market.php';
const API_HISTORY_BASE = 'https://member.starcg.net/marketrecord.php';
const MAX_PAGES = 20;

// 嘗試 fetch，失敗則換下一個 proxy
async function fetchWithProxy(targetUrl) {
    let lastError;
    // 加上時間戳繞過快取
    const cacheBuster = `_t=${Date.now()}`;
    const urlWithCache = targetUrl + (targetUrl.includes('?') ? '&' : '?') + cacheBuster;
    
    for (let i = 0; i < CORS_PROXIES.length; i++) {
        const proxyIndex = (currentProxyIndex + i) % CORS_PROXIES.length;
        const proxy = CORS_PROXIES[proxyIndex];
        const url = proxy.prefix + (proxy.encode ? encodeURIComponent(urlWithCache) : urlWithCache);
        
        try {
            const resp = await fetch(url, { cache: 'no-store' });
            const text = await resp.text();
            
            // 檢查是否為錯誤回應
            if (!resp.ok || text.startsWith('<!') || text.startsWith('<html') || text.includes('error code:')) {
                throw new Error(`Proxy ${proxyIndex} failed: ${resp.status}`);
            }
            
            // 成功，記住這個 proxy
            currentProxyIndex = proxyIndex;
            return text;
        } catch (err) {
            console.warn(`Proxy ${proxyIndex} failed:`, err.message);
            lastError = err;
        }
    }
    throw new Error('所有代理伺服器都無法連線，請稍後再試');
}

let allMarketItems = [];
let allHistoryLogs = [];
let pinnedTags = JSON.parse(localStorage.getItem('starcg_pinnedTags')) || ['一箱面包', '一箱法國面包', '一箱壽喜鍋'];
let quickTags = JSON.parse(localStorage.getItem('starcg_quickTags')) || [];
let currentSort = { field: 'price', order: 'asc' };
let currentTab = 'market';
const chartInstances = {};

/* ========================================
   初始化
======================================== */
document.addEventListener('DOMContentLoaded', () => {
    renderQuickTags();
    initEventListeners();
    initMapModal();
    initQuickTags();
    initBounty();
});

function initQuickTags() {
    document.getElementById('quickTags').addEventListener('click', e => {
        const act = e.target.dataset.act;
        if (act === 'clear') return clearHistoryTags();

        const tagEl = e.target.closest('.quick-tag');
        if (!tagEl) return;
        const tag = tagEl.dataset.tag;
        const pinned = tagEl.dataset.pinned === '1';

        if (act === 'search') quickSearch(tag);
        else if (act === 'pin') togglePin(tag, pinned);
        else if (act === 'remove') removeTag(tag, pinned);
    });
}

function initMapModal() {
    document.getElementById('mapModalClose').addEventListener('click', closeMapModal);
    document.getElementById('mapModal').addEventListener('click', e => {
        if (e.target.id === 'mapModal') closeMapModal();
    });
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { closeMapModal(); closeBountyModal(); }
    });
    // 地點欄位點擊（事件委派）
    document.getElementById('marketBody').addEventListener('click', e => {
        const link = e.target.closest('.location-link');
        if (link) showMapModal(link.dataset.x, link.dataset.y);
    });
}

function initEventListeners() {
    // 搜尋按鈕
    document.getElementById('searchBtn').addEventListener('click', searchMarket);
    document.getElementById('historyBtn').addEventListener('click', searchHistory);
    
    // Enter 鍵搜尋
    document.getElementById('searchInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') searchMarket();
    });
    
    // 篩選器變更
    ['currencyFilter', 'serverFilter', 'durabilityFilter', 'seedPlusFilter', 'seedMinusFilter'].forEach(id => {
        document.getElementById(id).addEventListener('change', applyFilters);
    });
    
    // 只搜尋寵物 checkbox
    document.getElementById('petOnlyFilter').addEventListener('change', applyFilters);
    
    // 匯率變更時重新渲染
    document.getElementById('exchangeRate').addEventListener('input', applyFilters);
    
    // Tab 切換
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => switchTab(tab.dataset.tab));
    });
    
    // 表頭排序
    document.querySelectorAll('#marketTable th[data-sort]').forEach(th => {
        th.addEventListener('click', () => sortTable(th.dataset.sort));
    });
}

/* ========================================
   快速標籤
======================================== */
function saveTags() {
    localStorage.setItem('starcg_pinnedTags', JSON.stringify(pinnedTags));
    localStorage.setItem('starcg_quickTags', JSON.stringify(quickTags));
}

function tagHtml(tag, pinned) {
    const t = escapeHtml(tag);
    return `
        <div class="quick-tag${pinned ? ' pinned' : ''}" data-tag="${t}" data-pinned="${pinned ? 1 : 0}">
            <span class="pin" data-act="pin" title="${pinned ? '取消釘選' : '釘選保留'}">${pinned ? '📌' : '📍'}</span>
            <span class="label" data-act="search">${t}</span>
            <span class="remove" data-act="remove" title="移除">✕</span>
        </div>`;
}

function renderQuickTags() {
    const container = document.getElementById('quickTags');
    const pinnedHtml = pinnedTags.map(tag => tagHtml(tag, true)).join('');
    const historyHtml = quickTags.map(tag => tagHtml(tag, false)).join('');
    const clearBtn = quickTags.length > 0
        ? `<button class="clear-tags" data-act="clear" title="清空非釘選的搜尋紀錄">🗑️ 清空紀錄</button>`
        : '';
    container.innerHTML = pinnedHtml + historyHtml + clearBtn;
}

function quickSearch(tag) {
    document.getElementById('searchInput').value = tag;
    // 是寵物才勾「只搜尋寵物」，否則自動取消
    document.getElementById('petOnlyFilter').checked = BOUNTY_PETS.includes(tag);
    searchMarket();
}

function removeTag(tag, pinned) {
    const arr = pinned ? pinnedTags : quickTags;
    const i = arr.indexOf(tag);
    if (i !== -1) arr.splice(i, 1);
    saveTags();
    renderQuickTags();
}

function togglePin(tag, pinned) {
    if (pinned) {
        // 取消釘選 → 移回歷史
        const i = pinnedTags.indexOf(tag);
        if (i !== -1) pinnedTags.splice(i, 1);
        if (!quickTags.includes(tag)) quickTags.unshift(tag);
    } else {
        // 釘選 → 從歷史移到釘選
        const i = quickTags.indexOf(tag);
        if (i !== -1) quickTags.splice(i, 1);
        if (!pinnedTags.includes(tag)) pinnedTags.push(tag);
    }
    saveTags();
    renderQuickTags();
}

function clearHistoryTags() {
    if (quickTags.length === 0) return;
    if (!confirm('確定清空所有非釘選的搜尋紀錄？')) return;
    quickTags = [];
    saveTags();
    renderQuickTags();
}

function addTag(tag) {
    if (!tag || pinnedTags.includes(tag) || quickTags.includes(tag)) return;
    quickTags.unshift(tag);
    // 歷史紀錄上限 30 筆，超過砍最舊
    if (quickTags.length > 30) quickTags.length = 30;
    saveTags();
    renderQuickTags();
}

/* ========================================
   市場搜尋
======================================== */
async function searchMarket() {
    const keyword = document.getElementById('searchInput').value.trim();
    if (!keyword) return alert('請輸入搜尋關鍵字');
    
    showLoading(true);
    hideAll();
    
    // 清空舊的歷史資料和圖表，讓切換 tab 時重新搜尋
    allHistoryLogs = [];
    // 銷毀所有圖表實例
    Object.values(chartInstances).forEach(chart => chart.destroy());
    Object.keys(chartInstances).forEach(key => delete chartInstances[key]);
    
    try {
        allMarketItems = await fetchMarketData(keyword);
        
        if (allMarketItems.length > 0) {
            addTag(keyword);
            document.getElementById('tabsContainer').style.display = 'flex';
            switchTab('market');
            applyFilters();
        } else {
            showEmpty('找不到符合的物品');
        }
    } catch (err) {
        console.error(err);
        alert('搜尋失敗，請稍後再試或檢查網路連線');
        showEmpty('搜尋失敗');
    } finally {
        showLoading(false);
    }
}

// 標準化字串：全形括號轉半形、統一空格等
function normalizeStr(str) {
    return str
        .replace(/（/g, '(')
        .replace(/）/g, ')')
        .replace(/【/g, '[')
        .replace(/】/g, ']')
        .replace(/　/g, ' ');
}

async function fetchMarketData(keyword) {
    const items = [];
    let page = 1;
    let hasMore = true;
    const normalizedKeyword = normalizeStr(keyword);
    
    while (hasMore && page <= MAX_PAGES) {
        const targetUrl = `${API_MARKET_BASE}?ajax=1&type=all&server=all&exact=0&page=${page}&search=${encodeURIComponent(keyword)}`;
        const text = await fetchWithProxy(targetUrl);
        const data = JSON.parse(text);
        
        if (data.totalFiltered === 0) break;
        if (data.totalFiltered > 300) {
            alert('結果太多，請輸入更精確的關鍵字');
            return [];
        }
        
        // 處理攤位資料
        const itemsMap = data.itemsByCd || {};
        const petsMap = data.petsByCd || {};
        
        (data.stalls || []).forEach(stall => {
            const cdkey = stall.cdkey;
            
            // 道具
            (itemsMap[cdkey] || []).forEach(item => {
                const normalizedItemName = normalizeStr(item.ITEM_TRUENAME);
                if (normalizedItemName.includes(normalizedKeyword)) {
                    // 處理改造圖等級區分（嘗試多種可能的欄位名）
                    let displayName = item.ITEM_TRUENAME;
                    let gradeTag = '';
                    let seedTag = '';
                    const itemLevel = item.ITEM_LEVEL || item.level || item.Level || item.ITEM_LV || item.lv || 0;
                    if (item.ITEM_TRUENAME.includes('改造圖') && itemLevel > 0) {
                        if (itemLevel === 5) gradeTag = '<span class="grade-normal">普通</span>';
                        else if (itemLevel === 6) gradeTag = '<span class="grade-silver">銀</span>';
                        else if (itemLevel === 7) gradeTag = '<span class="grade-gold">金</span>';
                        else gradeTag = `<span class="grade-normal">Lv${itemLevel}</span>`;
                    }
                    
                    // 處理重來的種子 BP 配點顯示
                    let seedPlusStats = [];
                    let seedMinusStats = [];
                    if (item.ITEM_TRUENAME.includes('重來的種子') && item.ITEM_ARGUMENT) {
                        const bpNames = ['體', '攻', '防', '敏', '魔'];
                        const bpValues = item.ITEM_ARGUMENT.split('|').map(Number);
                        let plusParts = [];
                        let minusParts = [];
                        bpValues.forEach((val, idx) => {
                            if (val > 0) {
                                plusParts.push(`<span class="bp-plus">+${val}${bpNames[idx]}</span>`);
                                seedPlusStats.push(bpNames[idx]);
                            } else if (val < 0) {
                                minusParts.push(`<span class="bp-minus">${val}${bpNames[idx]}</span>`);
                                seedMinusStats.push(bpNames[idx]);
                            }
                        });
                        // 固定順序：+1在前，-1在後
                        const allParts = [...plusParts, ...minusParts];
                        if (allParts.length > 0) seedTag = allParts.join(' ');
                    }
                    
                    items.push({
                        item: displayName,
                        gradeTag: gradeTag,
                        seedTag: seedTag,
                        isSeed: seedPlusStats.length > 0 || seedMinusStats.length > 0,
                        seedPlusStats: seedPlusStats,
                        seedMinusStats: seedMinusStats,
                        itemLevel: itemLevel,
                        price: item.price,
                        pricetype: item.pricetype,
                        durability: `${item.ITEM_DURABILITY}/${item.ITEM_MAXDURABILITY}`,
                        durCurrent: item.ITEM_DURABILITY,
                        durMax: item.ITEM_MAXDURABILITY,
                        attack: Math.max(item.ITEM_ADM || 0, item.ITEM_MODIFYATTACK || 0),
                        defence: item.ITEM_MODIFYDEFENCE || 0,
                        agility: item.ITEM_MODIFYAGILITY || 0,
                        location: stall.coords,
                        mapX: stall.x ?? parseCoords(stall.coords)?.x,
                        mapY: stall.y ?? parseCoords(stall.coords)?.y,
                        hasMap: isFranCityCoords(stall.coords),
                        server: stall.server,
                        shopName: stall.name,
                        count: item.ITEM_REMAIN,
                        isPet: false
                    });
                }
            });
            
            // 寵物
            (petsMap[cdkey] || []).forEach(pet => {
                const normalizedPetName = normalizeStr(pet.Name);
                if (normalizedPetName.includes(normalizedKeyword)) {
                    // 寵物標籤：等級、改造、技能欄數
                    const petLv = pet.Lv || 1;
                    const trans = pet.Trans || 0;
                    const slot = pet.Slot || 6;
                    
                    let petTags = `<span class="pet-lv">Lv${petLv}</span>`;
                    petTags += `<span class="pet-trans">${trans}改</span>`;
                    petTags += `<span class="pet-slot">${slot}技</span>`;
                    
                    items.push({
                        item: pet.Name,
                        transTag: petTags,
                        gradeTag: '',
                        price: pet.price,
                        pricetype: pet.pricetype,
                        durability: '-',
                        durCurrent: 0,
                        durMax: 0,
                        attack: '-',
                        defence: '-',
                        agility: '-',
                        location: stall.coords,
                        mapX: stall.x ?? parseCoords(stall.coords)?.x,
                        mapY: stall.y ?? parseCoords(stall.coords)?.y,
                        hasMap: isFranCityCoords(stall.coords),
                        server: stall.server,
                        shopName: stall.name,
                        count: 1,
                        isPet: true
                    });
                }
            });
        });
        
        if (page * (data.perPage || 20) >= data.totalFiltered) hasMore = false;
        page++;
    }
    
    return items;
}

/* ========================================
   歷史成交搜尋
======================================== */
async function searchHistory() {
    const keyword = document.getElementById('searchInput').value.trim();
    if (!keyword) return alert('請輸入搜尋關鍵字');
    
    showLoading(true);
    hideAll();
    
    try {
        allHistoryLogs = await fetchHistoryData(keyword);
        
        if (allHistoryLogs.length > 0) {
            addTag(keyword);
            document.getElementById('tabsContainer').style.display = 'flex';
            switchTab('history');
            renderHistoryData();
        } else {
            showEmpty('找不到歷史成交記錄');
        }
    } catch (err) {
        console.error(err);
        alert('搜尋失敗，請稍後再試或檢查網路連線');
        showEmpty('搜尋失敗');
    } finally {
        showLoading(false);
    }
}

async function fetchHistoryData(keyword) {
    const logs = [];
    const TIME_RANGE = 72 * 60 * 60 * 1000; // 72小時
    const now = Date.now();
    let page = 1;
    let keepFetching = true;
    
    while (keepFetching && page <= 100) {
        const targetUrl = `${API_HISTORY_BASE}?ajax=1&type=all&page=${page}&search=${encodeURIComponent(keyword)}`;
        const text = await fetchWithProxy(targetUrl);
        const data = JSON.parse(text);
        
        if (!data.logs || data.logs.length === 0) break;
        
        for (const log of data.logs) {
            const logTime = new Date(log.time_text).getTime();
            if (now - logTime > TIME_RANGE) {
                keepFetching = false;
                break;
            }
            
            // 解析物品名稱和數量（格式：「購買X個：物品名稱」或「購買X個:物品名稱」）
            const qtyMatch = log.buff.match(/購買(\d+)個[：:]/);
            const quantity = qtyMatch ? parseInt(qtyMatch[1]) : 1;
            const parts = log.buff.split(/[：:]/);
            const itemName = parts.length > 1 ? parts[1] : parts[0];
            
            // 還原售價（扣除手續費）並計算單價
            const originalTotalPrice = Math.ceil(log.price / (log.pricetype === 1 ? 0.94 : 0.9));
            const unitPrice = Math.ceil(originalTotalPrice / quantity);
            
            logs.push({
                item: itemName,
                price: unitPrice,
                pricetype: log.pricetype,
                time: log.time_text,
                quantity: quantity
            });
        }
        
        page++;
    }
    
    return logs;
}

/* ========================================
   篩選與排序
======================================== */
function applyFilters() {
    const currency = document.getElementById('currencyFilter').value;
    const server = document.getElementById('serverFilter').value;
    const durability = document.getElementById('durabilityFilter').value;
    const petOnly = document.getElementById('petOnlyFilter').checked;
    const seedPlus = document.getElementById('seedPlusFilter').value;
    const seedMinus = document.getElementById('seedMinusFilter').value;
    
    let filtered = [...allMarketItems];
    
    // 只搜尋寵物
    if (petOnly) {
        filtered = filtered.filter(i => i.isPet === true);
    }
    
    // 種子 +/- 配點篩選（只要任一條件啟用，就只保留符合的種子）
    if (seedPlus !== 'all' || seedMinus !== 'all') {
        filtered = filtered.filter(i =>
            i.isSeed &&
            (seedPlus === 'all' || (i.seedPlusStats || []).includes(seedPlus)) &&
            (seedMinus === 'all' || (i.seedMinusStats || []).includes(seedMinus))
        );
    }
    
    // 幣種篩選
    if (currency !== 'all') {
        filtered = filtered.filter(i => i.pricetype.toString() === currency);
    }
    
    // 分流篩選
    if (server !== 'all') {
        filtered = filtered.filter(i => i.server.toString() === server);
    }
    
    // 耐久篩選
    if (durability === 'full') {
        filtered = filtered.filter(i => i.isPet || i.durCurrent === i.durMax);
    }
    
    // 排序
    filtered = sortItems(filtered);
    
    // 更新統計
    updateStats(filtered);
    
    // 渲染表格
    renderMarketTable(filtered);
}

function sortItems(items) {
    const { field, order } = currentSort;
    
    return [...items].sort((a, b) => {
        let valA = a[field];
        let valB = b[field];
        
        // 耐久特殊處理
        if (field === 'durability') {
            valA = a.durCurrent;
            valB = b.durCurrent;
        }
        
        if (typeof valA === 'string') {
            return order === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
        }
        return order === 'asc' ? valA - valB : valB - valA;
    });
}

function sortTable(field) {
    if (currentSort.field === field) {
        currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
    } else {
        currentSort = { field, order: 'asc' };
    }
    
    // 更新排序圖示
    document.querySelectorAll('#marketTable th .sort-icon').forEach(icon => {
        icon.classList.remove('active');
        icon.textContent = '▲';
    });
    
    const th = document.querySelector(`#marketTable th[data-sort="${field}"]`);
    if (th) {
        const icon = th.querySelector('.sort-icon') || document.createElement('span');
        icon.className = 'sort-icon active';
        icon.textContent = currentSort.order === 'asc' ? '▲' : '▼';
        if (!th.querySelector('.sort-icon')) th.appendChild(icon);
    }
    
    applyFilters();
}

/* ========================================
   渲染
======================================== */
function renderMarketTable(items) {
    const tbody = document.getElementById('marketBody');
    
    if (items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-secondary);">無符合條件的物品</td></tr>';
        document.getElementById('marketSection').style.display = 'block';
        return;
    }
    
    // 合併相同物品（同攤位、同物品、同價格、同數值才合併）
    const merged = {};
    items.forEach(item => {
        // 寵物不合併（每隻都是獨立個體）
        if (item.isPet) {
            const uniqueKey = `pet-${Date.now()}-${Math.random()}`;
            merged[uniqueKey] = { ...item };
        } else {
            // 一般物品：同攤位+同物品+同價格+同數值+同BP配點才合併
            const key = `${item.location}-${item.item}-${item.price}-${item.server}-${item.durability}-${item.attack}-${item.defence}-${item.agility}-${item.seedTag || ''}`;
            if (!merged[key]) {
                merged[key] = { ...item };
            } else {
                merged[key].count += item.count;
            }
        }
    });
    
    const rate = parseInt(document.getElementById('exchangeRate').value) || 300;
    
    tbody.innerHTML = Object.values(merged).map(item => {
        // 計算換算價格
        let converted = '';
        if (item.pricetype === 0) {
            // 魔幣換算成魔晶
            const crystalVal = Math.round(item.price / rate);
            converted = `<span class="converted">(~${crystalVal.toLocaleString()}💎)</span>`;
        } else {
            // 魔晶換算成魔幣
            const coinVal = Math.round(item.price * rate);
            converted = `<span class="converted">(~${coinVal.toLocaleString()}💰)</span>`;
        }
        
        return `
        <tr>
            <td><strong>${escapeHtml(item.item)}</strong> ${item.gradeTag || ''}${item.seedTag || ''}${item.transTag || ''}</td>
            <td>
                <span class="price ${item.pricetype === 0 ? 'coin' : 'crystal'}">
                    ${item.pricetype === 0 ? '💰' : '💎'} ${item.price.toLocaleString()}
                </span>
                ${converted}
            </td>
            <td>
                <span class="server-badge s${item.server}">S${item.server}</span>
                ${item.hasMap && item.mapX != null
                    ? `<span class="location-link" data-x="${item.mapX}" data-y="${item.mapY}" title="點擊查看地圖">📍 ${escapeHtml(item.location)}</span>`
                    : escapeHtml(item.location)}
            </td>
            <td>${escapeHtml(item.shopName)}</td>
            <td>${item.durability}</td>
            <td>${item.attack || '-'}</td>
            <td>${item.defence || '-'}</td>
            <td>${item.agility || '-'}</td>
            <td>${item.count}</td>
        </tr>`;
    }).join('');
    
    document.getElementById('marketSection').style.display = 'block';
}

function renderHistoryData() {
    // 按物品分組統計
    const grouped = {};
    
    allHistoryLogs.forEach(log => {
        if (!grouped[log.item]) {
            grouped[log.item] = { coins: [], crystals: [], total: 0 };
        }
        if (log.pricetype === 0) {
            grouped[log.item].coins.push(log.price);
        } else {
            grouped[log.item].crystals.push(log.price);
        }
        grouped[log.item].total++;
    });
    
    // 計算統計
    const stats = Object.entries(grouped).map(([item, data]) => ({
        item,
        minCoin: data.coins.length ? Math.min(...data.coins) : 0,
        maxCoin: data.coins.length ? Math.max(...data.coins) : 0,
        avgCoin: data.coins.length ? calcTrimmedAvg(data.coins) : 0,
        minCrystal: data.crystals.length ? Math.min(...data.crystals) : 0,
        maxCrystal: data.crystals.length ? Math.max(...data.crystals) : 0,
        avgCrystal: data.crystals.length ? calcTrimmedAvg(data.crystals) : 0,
        total: data.total
    }));
    
    // 渲染表格（每個物件後面加上圖表行）
    const tbody = document.getElementById('historyBody');
    tbody.innerHTML = stats.map((row, index) => `
        <tr>
            <td><strong>${escapeHtml(row.item)}</strong></td>
            <td style="color:var(--accent-green)">${row.minCoin ? row.minCoin.toLocaleString() : '-'}</td>
            <td style="color:var(--accent-gold)">${row.avgCoin ? row.avgCoin.toLocaleString() : '-'}</td>
            <td style="color:var(--accent-red)">${row.maxCoin ? row.maxCoin.toLocaleString() : '-'}</td>
            <td style="color:var(--accent-green)">${row.minCrystal ? row.minCrystal.toLocaleString() : '-'}</td>
            <td style="color:var(--accent-gold)">${row.avgCrystal ? row.avgCrystal.toLocaleString() : '-'}</td>
            <td style="color:var(--accent-red)">${row.maxCrystal ? row.maxCrystal.toLocaleString() : '-'}</td>
            <td>${row.total}</td>
            <td><button class="secondary" style="padding:6px 12px;font-size:0.8rem;" onclick="toggleChart(${index}, '${escapeHtml(row.item)}')">📈</button></td>
        </tr>
        <tr id="chartRow${index}" class="chart-row" style="display:none;">
            <td colspan="9" style="padding:0; background:var(--bg-dark);">

                    <div class="chart-title">📈 ${escapeHtml(row.item)} 價格走勢</div>
                    <div class="inline-chart-wrapper">
                        <canvas id="chart${index}"></canvas>
                    </div>
                </div>
            </td>

function toggleChart(index, itemName) {
    const chartRow = document.getElementById(`chartRow${index}`);
    const isVisible = chartRow.style.display !== 'none';
    
    if (isVisible) {
        chartRow.style.display = 'none';
        return;
    }
    
    chartRow.style.display = '';
    
    // 如果已經畫過就不重畫
    if (chartInstances[index]) return;
    
    // 篩選該物品的資料並簡化
    const itemLogs = allHistoryLogs.filter(l => l.item === itemName);
    const coinData = simplifyData(itemLogs.filter(l => l.pricetype === 0).sort((a, b) => new Date(a.time) - new Date(b.time)));
    const crystalData = simplifyData(itemLogs.filter(l => l.pricetype === 1).sort((a, b) => new Date(a.time) - new Date(b.time)));
    
    const ctx = document.getElementById(`chart${index}`).getContext('2d');
    
    const datasets = [];
    if (coinData.length > 0) {
        datasets.push({
            label: '魔幣 💰',
            data: coinData.map(d => ({ x: d.time, y: d.price })),
            borderColor: '#d4a024',
            backgroundColor: 'rgba(212, 160, 36, 0.15)',
            tension: 0.4,

            borderWidth: 2,
            fill: true
        });

            data: crystalData.map(d => ({ x: d.time, y: d.price })),
            borderColor: '#9068b0',
            backgroundColor: 'rgba(144, 104, 176, 0.15)',
            tension: 0.4,
            pointRadius: 3,
            borderWidth: 2,
            fill: true
        });
    }
    
    chartInstances[index] = new Chart(ctx, {
        type: 'line',
        data: { datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { intersect: false, mode: 'index' },
            plugins: {
                legend: { display: true, labels: { color: '#4a3f35' } },
                tooltip: {
                    backgroundColor: '#fffbf5',

                    borderWidth: 1,
                    titleColor: '#4a3f35',

                }

            scales: {

                    type: 'category',

                        maxTicksLimit: 8,

                        minRotation: 0

                y: {
                    ticks: { color: '#8b7355' },
                    grid: { color: '#e0d5c5' }
                }
            }
        }
    });
}

// 簡化數據：合併相同價格的連續數據點
function simplifyData(data) {
    if (data.length <= 20) return data;
    
    const simplified = [];
    let lastPrice = null;
    let lastTime = null;
    
    data.forEach((d, i) => {
        // 保留第一筆、最後一筆、價格變化的點
        if (i === 0 || i === data.length - 1 || d.price !== lastPrice) {
            // 如果跳過了很多相同價格的點，加一個中間點標記
            if (lastPrice !== null && d.price === lastPrice && simplified.length > 0) {
                // 已經有相同價格的起點了，跳過
            } else {
                simplified.push(d);
            }
            lastPrice = d.price;
            lastTime = d.time;
        }
    });
    
    return simplified;
}


function updateStats(items) {
    const currency = document.getElementById('currencyFilter').value;
    const rate = parseInt(document.getElementById('exchangeRate').value) || 260;
    
    if (currency === 'all') {
        // 分別計算兩種幣種的數量
        const coinCount = items.filter(i => i.pricetype === 0).reduce((sum, i) => sum + i.count, 0);
        const crystalCount = items.filter(i => i.pricetype === 1).reduce((sum, i) => sum + i.count, 0);
        
        // 在售數量：一行魔幣、一行魔晶
        const countLines = [];
        if (coinCount > 0) countLines.push(`💰 ${coinCount.toLocaleString()}`);
        if (crystalCount > 0) countLines.push(`💎 ${crystalCount.toLocaleString()}`);
        document.getElementById('statCount').innerHTML = countLines.length > 0 ? countLines.join('<br>') : '-';
    } else {
        // 單一幣種模式
        const totalCount = items.reduce((sum, i) => sum + i.count, 0);
        document.getElementById('statCount').textContent = totalCount.toLocaleString();
    }
    
    if (currency === 'all') {
        // 分別計算兩種幣種的價格
        const coinPrices = items.filter(i => i.pricetype === 0).map(i => i.price);
        const crystalPrices = items.filter(i => i.pricetype === 1).map(i => i.price);
        
        // 計算星幣統計
        const coinMin = coinPrices.length ? Math.min(...coinPrices) : 0;
        const coinMax = coinPrices.length ? Math.max(...coinPrices) : 0;
        const coinAvg = coinPrices.length ? calcTrimmedAvg(coinPrices) : 0;
        
        // 計算魔晶統計
        const crystalMin = crystalPrices.length ? Math.min(...crystalPrices) : 0;
        const crystalMax = crystalPrices.length ? Math.max(...crystalPrices) : 0;
        const crystalAvg = crystalPrices.length ? calcTrimmedAvg(crystalPrices) : 0;
        
        // 格式化顯示：主要價格 (~換算價格)
        const formatPrice = (mainPrice, convertedPrice, convertedIcon) => {
            if (mainPrice === 0) return '-';
            const converted = convertedPrice > 0 ? ` (~${convertedPrice.toLocaleString()}${convertedIcon})` : '';
            return `${mainPrice.toLocaleString()}${converted}`;
        };
        
        // 最低價：星幣最低 (~魔晶換算) / 魔晶最低 (~星幣換算)
        const minCoinText = coinMin > 0 ? `💰 ${formatPrice(coinMin, Math.round(coinMin / rate), '💎')}` : '';
        const minCrystalText = crystalMin > 0 ? `💎 ${formatPrice(crystalMin, Math.round(crystalMin * rate), '💰')}` : '';
        document.getElementById('statMinPrice').innerHTML = [minCoinText, minCrystalText].filter(Boolean).join('<br>') || '-';
        
        // 中位價：星幣中位 (~魔晶換算) / 魔晶中位 (~星幣換算)
        const avgCoinText = coinAvg > 0 ? `💰 ${formatPrice(coinAvg, Math.round(coinAvg / rate), '💎')}` : '';
        const avgCrystalText = crystalAvg > 0 ? `💎 ${formatPrice(crystalAvg, Math.round(crystalAvg * rate), '💰')}` : '';
        document.getElementById('statAvgPrice').innerHTML = [avgCoinText, avgCrystalText].filter(Boolean).join('<br>') || '-';
        
        // 最高價：星幣最高 (~魔晶換算) / 魔晶最高 (~星幣換算)
        const maxCoinText = coinMax > 0 ? `💰 ${formatPrice(coinMax, Math.round(coinMax / rate), '💎')}` : '';
        const maxCrystalText = crystalMax > 0 ? `💎 ${formatPrice(crystalMax, Math.round(crystalMax * rate), '💰')}` : '';
        document.getElementById('statMaxPrice').innerHTML = [maxCoinText, maxCrystalText].filter(Boolean).join('<br>') || '-';
    } else {
        // 單一幣種模式（原有邏輯）
        const priceType = currency === '1' ? 1 : 0;
        const prices = items
            .filter(i => i.pricetype === priceType)
            .map(i => i.price);
        
        document.getElementById('statMinPrice').textContent = prices.length ? Math.min(...prices).toLocaleString() : '-';
        document.getElementById('statMaxPrice').textContent = prices.length ? Math.max(...prices).toLocaleString() : '-';
        document.getElementById('statAvgPrice').textContent = prices.length ? calcTrimmedAvg(prices).toLocaleString() : '-';
    }
    
    document.getElementById('statsGrid').style.display = 'grid';
}

async function switchTab(tab) {

    document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
    
    document.getElementById('marketSection').style.display = tab === 'market' ? 'block' : 'none';
    document.getElementById('historySection').style.display = tab === 'history' ? 'block' : 'none';
    document.getElementById('statsGrid').style.display = tab === 'market' ? 'grid' : 'none';
    
    // 切換到歷史成交時，如果還沒有資料就自動搜尋
    if (tab === 'history' && allHistoryLogs.length === 0) {
        const keyword = document.getElementById('searchInput').value.trim();
        if (keyword) {
            showLoading(true);
            document.getElementById('historySection').style.display = 'none';

                allHistoryLogs = await fetchHistoryData(keyword);

        }
    }

let mapSrcIndex = 0;

function isFranCityCoords(coords) {
    return coords && coords.includes('法蘭城');
}

function parseCoords(coords) {
    const m = coords && coords.match(/\[東[:：](\d+)\s*南[:：](\d+)\]/);
    return m ? { x: Number(m[1]), y: Number(m[2]) } : null;
}

// 等距座標轉像素（公式來自 Baconrad/StarCG-Market-Assistant）
function gameToPixel(gx, gy) {
    const refGX = 248, refGY = 88, refPX = 710.9, refPY = 133.1;
    const dgX = gx - refGX, dgY = gy - refGY;
    const ux_px = 2.6285, ux_py = -1.9188;
    const uy_px = 2.6285, uy_py = 1.9188;
    return {
        x: refPX + dgX * ux_px + dgY * uy_px,
        y: refPY + dgX * ux_py + dgY * uy_py
    };
}

function drawMapMarker(x, y) {
    const canvas = document.getElementById('mapCanvas');
    if (!canvas || !mapImg.complete || !mapImg.naturalWidth) return;

    const ctx = canvas.getContext('2d');
    if (canvas.width !== mapImg.width || canvas.height !== mapImg.height) {
        canvas.width = mapImg.width;
        canvas.height = mapImg.height;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(mapImg, 0, 0);

    const pos = gameToPixel(x, y);

    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 8, 0, Math.PI * 2);
    ctx.fillStyle = 'red';
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.shadowColor = 'black';
    ctx.shadowBlur = 4;
    ctx.fillStyle = 'white';
    ctx.font = 'bold 24px Arial';
    ctx.fillText(`${x}, ${y}`, pos.x + 15, pos.y + 5);
    ctx.shadowBlur = 0;
}

function showMapModal(x, y) {
    const gx = Number(x), gy = Number(y);
    if (isNaN(gx) || isNaN(gy)) return alert('無法解析座標');

    document.getElementById('mapModalTitle').textContent = `攤位位置 (X: ${gx}, Y: ${gy})`;
    document.getElementById('mapModal').classList.add('open');

}

const BOUNTY_PETS = ['大地鼠','迷你蝙蝠','哥布林','紅帽哥布林','樹精','妖草','異型蜂','惡魔螃蟹','穴熊','大蝙蝠','火蜘蛛','火焰鼠','小惡魔','蜥蜴戰士','印地安仙人掌','殺手蠍','紅蠍','火焰哥布林','烈風哥布林','蔓陀羅草','幻歌妖','烈風鳥人','胖蝙蝠','死亡蜂','死亡樹精','殺人蜂','黃色口臭鬼'];

function renderBounty() {
    const equipPanel = document.getElementById('bountyEquipPanel');
    equipPanel.innerHTML = Object.entries(BOUNTY_EQUIPMENT).map(([cat, items]) => `
        <div class="bounty-cat">
            <div class="bounty-cat-title">${cat}</div>
            <div class="bounty-grid">
                ${items.map(([lv, name]) => `
                    <span class="bounty-item" data-name="${escapeHtml(name)}">
                        <span class="lv">${lv}</span>${escapeHtml(name)}
                    </span>`).join('')}
            </div>
        </div>`).join('');

    const petPanel = document.getElementById('bountyPetPanel');
    petPanel.innerHTML = `
        <div class="bounty-grid">
            ${BOUNTY_PETS.map(name => `
                <span class="bounty-item" data-name="${escapeHtml(name)}" data-pet="1">${escapeHtml(name)}</span>`).join('')}
        </div>`;
}

function openBountyModal() {
    document.getElementById('bountyModal').classList.add('open');
}
function closeBountyModal() {
    document.getElementById('bountyModal').classList.remove('open');
}

function initBounty() {
    renderBounty();
    document.getElementById('bountyBtn').addEventListener('click', openBountyModal);
    document.getElementById('bountyModalClose').addEventListener('click', closeBountyModal);
    document.getElementById('bountyModal').addEventListener('click', e => {
        if (e.target.id === 'bountyModal') closeBountyModal();
    });
    // tab 切換
    document.querySelectorAll('.bounty-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.bounty-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const isEquip = tab.dataset.btab === 'equip';
            document.getElementById('bountyEquipPanel').style.display = isEquip ? 'block' : 'none';
            document.getElementById('bountyPetPanel').style.display = isEquip ? 'none' : 'block';
        });
    });
    // 點裝備/寵物 → 帶入搜尋
    document.getElementById('bountyModal').addEventListener('click', e => {
        const item = e.target.closest('.bounty-item');
        if (!item) return;
        closeBountyModal();
        quickSearch(item.dataset.name);
    });
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

function calcTrimmedAvg(arr) {
    if (!arr.length) return 0;
    if (arr.length <= 2) {
        return Math.floor(arr.reduce((a, b) => a + b, 0) / arr.length);
    }
    const sorted = [...arr].sort((a, b) => a - b);
    const start = Math.floor(sorted.length * 0.1);
    const end = Math.ceil(sorted.length * 0.9);
    const trimmed = sorted.slice(start, end);
    return Math.floor(trimmed.reduce((a, b) => a + b, 0) / trimmed.length);
}
